<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CA — 기업·ETF 분석</title>
  <link rel="icon" type="image/png" href="assets/app_icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <script>if (window.Chart && window.ChartDataLabels) { Chart.register(window.ChartDataLabels); Chart.defaults.plugins.datalabels = Chart.defaults.plugins.datalabels || {}; Chart.defaults.plugins.datalabels.display = false; }</script>
</head>
<body>
  <div class="app-shell">
    <div class="backdrop" id="backdrop"></div>
    <aside class="sidebar" id="sidebar" aria-label="주 메뉴">
      <div class="sidebar-brand">CA</div>
      <nav class="sidebar-nav" role="navigation">
        <button class="nav-item" data-route="analysis">기업 분석</button>
        <button class="nav-item" data-route="compare">상대가치 비교</button>
        <button class="nav-item" data-route="leading">경기선행지표</button>
        <button class="nav-item" data-route="calendar">주요 일정</button>
      </nav>
      <div class="sidebar-nav-bottom">
        <button class="nav-item" data-route="help">도움말</button>
        <button class="nav-item" data-route="history">개발 히스토리</button>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기">☰</button>
        <h1 class="header-title" id="page-title">기업 분석</h1>
        <div class="header-search" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-owns="search-suggest">
          <input
            type="search"
            id="global-search"
            placeholder="기업명·티커 검색 (예: 엔비디아 / NVIDIA / NVDA)"
            autocomplete="off"
            aria-label="통합 검색"
            aria-autocomplete="list"
            aria-controls="search-suggest"
          />
          <div id="search-suggest" role="listbox" hidden></div>
        </div>
        <div class="market-toggle" role="radiogroup" aria-label="시장 구분">
          <label><input type="radio" name="market" value="all" checked /><span>전체</span></label>
          <label><input type="radio" name="market" value="kr" /><span>국내</span></label>
          <label><input type="radio" name="market" value="us" /><span>미국</span></label>
        </div>
      </header>

      <div class="content" id="content">
        <section class="route-panel" data-panel="analysis"></section>
        <section class="route-panel" data-panel="compare" hidden></section>
        <section class="route-panel" data-panel="leading" hidden></section>
        <section class="route-panel" data-panel="calendar" hidden></section>
        <section class="route-panel" data-panel="help" hidden></section>
        <section class="route-panel" data-panel="history" hidden></section>
      </div>

      <button class="drawer-handle" id="drawer-handle" aria-label="목록 패널 열기 (관심 / 최근)" title="목록 (관심·최근)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M5 3.5 V15 L9 12 L13 15 V3.5 Z" fill="currentColor" opacity="0.85"/>
          <circle cx="17" cy="17" r="5" fill="white" stroke="currentColor" stroke-width="1.8"/>
          <path d="M17 14 V17 L19 18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <aside class="right-drawer" id="right-drawer" aria-label="목록 패널">
        <div class="right-drawer-header">
          <div class="drawer-tabs" role="tablist">
            <button class="drawer-tab active" id="tab-recent" role="tab" aria-selected="true" aria-controls="drawer-recent">🕘 최근</button>
            <button class="drawer-tab" id="tab-watch" role="tab" aria-selected="false" aria-controls="drawer-watch">★ 관심</button>
          </div>
          <button class="right-drawer-close" id="drawer-close" aria-label="닫기">×</button>
        </div>
        <div class="right-drawer-body">
          <div id="drawer-recent" role="tabpanel" aria-labelledby="tab-recent"></div>
          <div id="drawer-watch" role="tabpanel" aria-labelledby="tab-watch" hidden></div>
        </div>
      </aside>

      <footer class="disclaimer">
        본 서비스는 정보 제공 목적의 참고 자료이며 투자 권유가 아닙니다. 모든 투자 판단과 책임은 사용자에게 있습니다.
      </footer>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
